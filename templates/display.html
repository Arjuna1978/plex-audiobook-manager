<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Name Splitter - Result</title>
    <style>
        /* Centers everything directly in the middle of the viewport */
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            font-family: Arial, sans-serif;
        }
    </style>
</head>
<body>

    <div>
        <!-- Displays the first name -->
        <h1>{{ first_name }}</h1>
        
        <!-- Displays the second name under it -->
        <h2>{{ second_name }}</h2>
        <b>{{ book_data }}</b>
        
        <br>
        <a href="/">← Go Back</a>
    </div>

</body>
</html>
